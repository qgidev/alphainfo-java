name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # JDK used to RUN Gradle. Modern Gradle (8.10+) requires JVM 17+.
        # The produced bytecode still targets Java 11 via
        # `options.release.set(11)` in build.gradle.kts, so consumers on
        # Java 11+ remain supported. We test under 17 and 21 to catch
        # any JDK-specific issues in the build/test pass.
        java: ["17", "21"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: gradle/actions/setup-gradle@v3
      - name: Build and test
        run: gradle test --no-daemon
      - name: Build jars
        run: gradle build --no-daemon
